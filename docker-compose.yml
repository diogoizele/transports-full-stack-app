version: '3.8'

services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    container_name: takehome_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: takehome
      MYSQL_USER: takehome
      MYSQL_PASSWORD: takehome
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    container_name: takehome_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: takehome
      DB_PASSWORD: takehome
      DB_NAME: takehome
      JWT_SECRET: takehome 
    depends_on:
      - mysql

volumes:
  mysql_data: